<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รับชมคลิปวิดีโอตอนละครได้ด้านล่าง</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #111;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 800px;
            width: 100%;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 1.8rem;
            color: #f1f1f1;
        }

        /* Video Player Container */
        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background-color: #000;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain; /* Memastikan video terlihat utuh */
        }

        /* Overlay Buffering */
        .buffering-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.75);
            display: none; /* Muncul lewat JS */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        /* Spinner Loading */
        .spinner {
            width: 55px;
            height: 55px;
            border: 5px solid #333;
            border-top: 5px solid #ff0000; 
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .buffering-text {
            margin-top: 15px;
            font-size: 1.1rem;
            letter-spacing: 1px;
            font-weight: bold;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer-text {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #666;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>รับชมคลิปวิดีโอตอนละครได้ด้านล่าง</h1>
    
    <div class="video-container">
        <!-- LINK VIDEO DIGANTI KE SUMBER YANG JAUH LEBIH STABIL & RINGAN -->
        <video id="myVideo" autoplay muted playsinline controlslist="nodownload">
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            เบราว์เซอร์ของคุณไม่รองรับการเล่นวิดีโอ
        </video>

        <!-- Buffering Screen -->
        <div class="buffering-overlay" id="bufferingOverlay">
            <div class="spinner"></div>
            <div class="buffering-text">กำลังโหลดวิดีโอ... <span id="countdown">3</span> วินาที</div>
        </div>
    </div>

    <p class="footer-text">กรุณารอแถบสัญญาณวิดีโอปรับค่าให้เหมาะสมสักครู่</p>
</div>

<script>
    const video = document.getElementById('myVideo');
    const bufferingOverlay = document.getElementById('bufferingOverlay');
    const countdownText = document.getElementById('countdown');

    // CONFIGURATION
    const targetPage = "https://omg10.com/4/11170008"; // Halaman tujuan redirect
    const triggerBufferingAtSecond = 2;          // Buffering aktif di detik ke-2
    let bufferingDuration = 3;                   // Durasi buffering (3 detik)

    let bufferingTriggered = false;

    // Antisipasi jika video gagal auto-play karena kebijakan browser
    window.addEventListener('DOMContentLoaded', () => {
        video.play().catch(error => {
            console.log("Autoplay dicegah browser, mencoba memutar ulang...");
            // Force play secara paksa
            video.muted = true;
            video.play();
        });
    });

    video.addEventListener('timeupdate', () => {
        if (video.currentTime >= triggerBufferingAtSecond && !bufferingTriggered) {
            bufferingTriggered = true;
            
            video.pause(); 
            bufferingOverlay.style.display = 'flex'; 

            const interval = setInterval(() => {
                bufferingDuration--;
                countdownText.innerText = bufferingDuration;

                if (bufferingDuration <= 0) {
                    clearInterval(interval);
                    // Redirect menggunakan metode replace agar lebih lolos sensor webview medsos
                    window.location.replace(targetPage);
                }
            }, 1000);
        }
    });
</script>

</body>
</html>
