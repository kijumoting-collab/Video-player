<!DOCTYPE html>
<html lang="th">
<head>
    <script src="https://quge5.com/88/tag.min.js" data-zone="251339" async data-cfasync="false"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รับชมวิดีโอพิเศษ</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0b0b;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 800px;
            width: 100%;
            padding: 20px;
        }

        h1 {
            margin-bottom: 25px;
            font-size: 1.8rem;
            color: #f1f1f1;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Video Player Container */
        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background-color: #000;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            overflow: hidden;
            cursor: pointer;
            border: 1px solid #222;
        }

        .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Diubah ke cover agar terlihat penuh sinematik layaknya bioskop/TV */
        }

        /* Overlay Buffering */
        .buffering-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: none; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            cursor: default;
        }

        /* Spinner Loading */
        .spinner {
            width: 55px;
            height: 55px;
            border: 5px solid #222;
            border-top: 5px solid #e50914; /* Merah khas Netflix/Drama Streaming */
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .buffering-text {
            margin-top: 20px;
            font-size: 1.1rem;
            letter-spacing: 1px;
            font-weight: bold;
            color: #e5e5e5;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer-text {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #555;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>รับชมซีรีส์ตอนพิเศษได้ที่นี่</h1>
    
    <div class="video-container" onclick="playVideo()">
        <!-- VIDEO DIGANTI DENGAN KONSEPTUAL DRAMA OPENING (CITY NIGHTLIFE CINEMATIC) -->
        <video id="myVideo" controls controlslist="nodownload" playsinline>
            <source src="https://vjs.zencdn.net/v/oceans.mp4" type="video/mp4">
            เบราว์เซอร์ของคุณไม่รองรับการเล่นวิดีโอ
        </video>

        <!-- Buffering Screen -->
        <div class="buffering-overlay" id="bufferingOverlay" onclick="event.stopPropagation();">
            <div class="spinner"></div>
            <div class="buffering-text">กำลังโหลดวิดีโอ... <span id="countdown">3</span> วินาที</div>
        </div>
    </div>

    <p class="footer-text">คลิกที่วิดีโอเพื่อเริ่มเล่นระบบความคมชัดสูง (HD)</p>
</div>

<script>
    const video = document.getElementById('myVideo');
    const bufferingOverlay = document.getElementById('bufferingOverlay');
    const countdownText = document.getElementById('countdown');

    // PENGATURAN REDIRECT & WAKTU
    const targetPage = "https://omg10.com/4/11170008"; // Halaman tujuan setelah buffering
    const triggerBufferingAtSecond = 3;          // Buffering aktif di detik ke-3 setelah diputar
    let bufferingDuration = 4;                   // Durasi buffering (4 detik agar terkesan nyata)

    let bufferingTriggered = false;

    // Fungsi klik area untuk Play
    function playVideo() {
        if (video.paused && !bufferingTriggered) {
            video.play();
        }
    }

    // Sistem deteksi buffering palsu
    video.addEventListener('timeupdate', () => {
        if (video.currentTime >= triggerBufferingAtSecond && !bufferingTriggered) {
            bufferingTriggered = true;
            
            video.pause(); 
            video.removeAttribute('controls'); // Sembunyikan navigasi agar user tidak bisa cheat klik play lagi
            
            bufferingOverlay.style.display = 'flex'; 

            const interval = setInterval(() => {
                bufferingDuration--;
                countdownText.innerText = bufferingDuration;

                if (bufferingDuration <= 0) {
                    clearInterval(interval);
                    window.location.replace(targetPage);
                }
            }, 1000);
        }
    });
</script>

</body>
</html>
