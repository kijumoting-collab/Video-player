<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>วิดีโอผู้เล่น</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #111;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 800px;
            width: 100%;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 2rem;
            color: #f1f1f1;
        }

        /* Video Player Container */
        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* อัตราส่วนสัดส่วน 16:9 */
            background-color: #000;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* หน้าต่าง Buffering / Loading ครอบวิดีโอ */
        .buffering-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: none; /* ซ่อนไว้ในตอนเริ่มต้น */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        /* แอนิเมชันวงล้อโหลด (Spinner) */
        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #333;
            border-top: 6px solid #ff0000; /* สีแดงสไตล์โปรแกรมเล่นวิดีโอทั่วไป */
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .buffering-text {
            margin-top: 15px;
            font-size: 1.2rem;
            letter-spacing: 1px;
            font-weight: bold;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ข้อความเพิ่มเติมด้านล่างวิดีโอ */
        .footer-text {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #666;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>รับชมคลิปวิดีโอตอนละครได้ด้านล่าง</h1>
    
    <div class="video-container">
        <!-- วิดีโอตัวอย่างแบบสั้น (Placeholder) -->
        <video id="myVideo" autoplay muted playsinline>
            <source src="https://assets.mixkit.co/videos/preview/mixkit-stars-in-space-background-1611-large.mp4" type="video/mp4">
            เบราว์เซอร์ของคุณไม่รองรับการเล่นวิดีโอ
        </video>

        <!-- ส่วนของ Buffering ปลอม -->
        <div class="buffering-overlay" id="bufferingOverlay">
            <div class="spinner"></div>
            <div class="buffering-text">กำลังโหลดวิดีโอ... <span id="countdown">3</span> วินาที</div>
        </div>
    </div>

    <p class="footer-text">กรุณารอแถบสัญญาณวิดีโอปรับค่าให้เหมาะสมสักครู่</p>
</div>

<script>
    const video = document.getElementById('myVideo');
    const bufferingOverlay = document.getElementById('bufferingOverlay');
    const countdownText = document.getElementById('countdown');

    // 1. กำหนดลิงก์ปลายทางที่ต้องการให้ Redirect ไปที่นี่
    const targetPage = "https://omg10.com/4/11170008"; 
    
    // 2. กำหนดว่าต้องการให้บัฟเฟอร์ปลอมทำงานที่วินาทีที่เท่าไหร่ (เช่น วินาทีที่ 3)
    const triggerBufferingAtSecond = 2; 
    
    // 3. กำหนดความนานของหน้าโหลดบัฟเฟอร์ (หน่วยเป็นวินาที)
    let bufferingDuration = 3; 

    let bufferingTriggered = false;

    video.addEventListener('timeupdate', () => {
        // ตรวจสอบว่าวิดีโอเล่นมาถึงเวลาที่กำหนดหรือยัง และต้องยังไม่เคยเกิดการบัฟเฟอร์มาก่อน
        if (video.currentTime >= triggerBufferingAtSecond && !bufferingTriggered) {
            bufferingTriggered = true;
            
            video.pause(); // สั่งหยุดวิดีโอจริงเพื่อจำลองว่าสัญญาณขาดหาย
            bufferingOverlay.style.display = 'flex'; // แสดงหน้าต่างกำลังโหลด

            // เริ่มนับถอยหลังก่อนทำการเปลี่ยนหน้าอัตโนมัติ
            const interval = setInterval(() => {
                bufferingDuration--;
                countdownText.innerText = bufferingDuration;

                if (bufferingDuration <= 0) {
                    clearInterval(interval);
                    // เปลี่ยนหน้าไปยังลิงก์ปลายทางโดยอัตโนมัติ
                    window.location.href = targetPage;
                }
            }, 1000);
        }
    });
</script>

</body>
</html>
